[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tessera-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["tessera_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=tessera_core --cov-report=term-missing --cov-fail-under=85"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["tessera_core"]

[tool.black]
line-length = 100
target-version = ["py312"]
