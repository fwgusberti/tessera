services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tessera
      POSTGRES_USER: tessera
      POSTGRES_PASSWORD: tessera
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tessera"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "ollama serve &
      sleep 5 &&
      ollama pull nomic-embed-text &&
      wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep nomic-embed-text"]
      interval: 10s
      timeout: 30s
      retries: 30
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://tessera:tessera@postgres:5432/tessera
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ../apps/api:/app/apps/api
      - ../packages/core:/app/packages/core

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+psycopg://tessera:tessera@postgres:5432/tessera
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ../apps/workers:/app/apps/workers
      - ../packages/core:/app/packages/core

  mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+psycopg://tessera:tessera@postgres:5432/tessera
      API_URL: http://api:8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - api

  web:
    build:
      context: ../apps/web
      dockerfile: ../../deploy/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api

volumes:
  postgres_data:
  ollama_data:
